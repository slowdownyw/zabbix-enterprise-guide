<!doctype html>
<html lang="ru">
<head>

  <title>Целевая архитектура мониторинга: поток данных</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --text: #d9e2ee;
      --muted: #718195;
      --blue: #64b5f6;
      --green: #81c784;
      --violet: #ce93d8;
      --orange: #ff8a65;
      --red: #ef9a9a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, Arial, sans-serif;
      padding: 16px;
    }

    .wrap {
      margin: 0 auto;
      max-width: 1420px;
    }

    h1 {
      font-size: 16px;
      line-height: 1.35;
      margin: 0 0 12px;
      text-align: center;
    }

    svg {
      display: block;
      height: auto;
      width: 100%;
    }

    .band-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .node-title {
      font-size: 13px;
      font-weight: 800;
    }

    .node-line {
      fill: var(--muted);
      font-size: 10.5px;
    }

    .legend {
      fill: #607080;
      font-size: 10px;
    }
  </style>
</head>

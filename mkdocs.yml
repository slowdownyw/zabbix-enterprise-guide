site_name: Zabbix Enterprise Guide
site_description: "Русскоязычная книга о зрелом мониторинге на Zabbix для крупной инфраструктуры: сервисная модель, severity, теги, LLD, runbooks, SLA, дашборды и эксплуатация."
site_author: slowdownyw
site_url: https://slowdownyw.github.io/zabbix-enterprise-guide/

repo_url: https://github.com/slowdownyw/zabbix-enterprise-guide
repo_name: slowdownyw/zabbix-enterprise-guide
edit_uri: edit/main/docs/

copyright: |
  &copy; 2026 slowdownyw —
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>
  (docs) /
  <a href="https://opensource.org/licenses/MIT" target="_blank">MIT</a>
  (code)

theme:
  name: material
  custom_dir: overrides
  language: ru
  features:
#    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - navigation.footer

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - ru
        - en

nav:
  - Главная: index.md
  - Манифест: 00_manifesto.md
  - Оглавление: contents.md
  - Глоссарий: glossary.md
  - Принципы и дизайн:
      - Сервис, а не хост: 01_service_not_host.md
      - Severity = действие: 02_severity_model.md
      - Теги и группы: 03_tags_and_groups.md
      - LLD и prototypes: 04_lld_and_prototypes.md
      - Многоуровневый дизайн: 05_layered_design.md
  - Архитектура и внедрение:
      - Слои и развёртывание: 06_architecture.md
      - Reference 90-day roadmap: 07_implementation_roadmap.md
      - GitOps для Zabbix: 08_gitops_for_zabbix.md
  - Эксплуатация:
      - Runbooks: 09_runbooks.md
      - SLA и сервисный каталог: 10_sla_service_catalog.md
      - Дашборды и отчётность: 11_dashboards_reporting.md
      - Эксплуатационная модель: 12_operations.md
  - Шаблоны:
      - Требования к шаблонам: 13_template_requirements.md
  - Финал:
      - Anti-patterns: 15_antipatterns.md
      - Implementation Playbook: 16_implementation_playbook.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/slowdownyw/zabbix-enterprise-guide
  generator: false

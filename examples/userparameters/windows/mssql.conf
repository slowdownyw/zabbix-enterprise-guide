# Plant: MSSQL UserParameters — Windows example
# Requires PowerShell and a least-privilege SQL login with DMV read permissions.
# Place scripts under: C:\Program Files\Zabbix Agent 2\scripts\

UserParameter=plant.mssql.blocked_sessions[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\mssql_blocked_sessions.ps1" -ServerInstance "$1" -Database "$2"
